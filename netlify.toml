[build]
  # Base directory - set to root so we can use absolute paths
  base = "."

  # Install dependencies and build
  command = "cd client && npm install && npm run build"

  # Directory to publish (absolute path from repo root)
  publish = "client/dist"

# Redirect all routes to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
